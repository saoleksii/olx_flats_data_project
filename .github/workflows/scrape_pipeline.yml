name: scraper to databricks 4 hours

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Execute Scraper
        env:
          URL_HOST: ${{ secrets.URL_HOST }}
          TOKEN: ${{ secrets.TOKEN }}
        run: python fetch.py